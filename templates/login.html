<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanzasDúo — Iniciar sesión</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">💰 FinanzasDúo</div>
    <h2 class="auth-title">Bienvenido de vuelta</h2>

    <div id="error" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label class="lbl">Correo electrónico</label>
      <input id="email" type="email" placeholder="tu@correo.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="lbl">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary btn-full" id="btn-login">Iniciar sesión</button>

    <p class="auth-link">¿No tienes cuenta? <a href="/registro">Regístrate</a></p>
  </div>

  <script>
    document.getElementById('btn-login').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('error');
      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Completa todos los campos'; errEl.style.display = 'block'; return; }
      const btn = document.getElementById('btn-login');
      btn.textContent = 'Entrando...'; btn.disabled = true;
      try {
        const res  = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Error');
        window.location.href = '/';
      } catch(e) {
        errEl.textContent = e.message; errEl.style.display = 'block';
        btn.textContent = 'Iniciar sesión'; btn.disabled = false;
      }
    });
    document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-login').click(); }));
  </script>
</body>
</html>
